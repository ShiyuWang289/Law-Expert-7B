model_name_or_path: /root/autodl-tmp/LLaMA-Factory/models/Qwen/Qwen2.5-7B-Instruct
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: all

### quantization (QLoRA)
quantization_bit: 4

### dataset
dataset: law_qa_p3_a_random_500   # ← 已改正
template: qwen
cutoff_len: 2048                   # ← 与 B 统一
overwrite_cache: true
preprocessing_num_workers: 8

### output
output_dir: /root/autodl-tmp/saves/law_qa_p3_A_random_500   # ← 已改正
logging_steps: 5
save_steps: 100
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 8     # ← 与 B 统一
learning_rate: 1.0e-4
num_train_epochs: 1.0              # ← 与 B 统一
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
max_grad_norm: 1.0

### eval
val_size: 0.1
per_device_eval_batch_size: 2
eval_strategy: steps
eval_steps: 50
